<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המחברת שלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23378ADD'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-size='34' font-family='serif' fill='white'%3E%D7%9E%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg-grad: linear-gradient(180deg, #EEF5FC 0%, #F8FBFF 100%);
  --sidebar: #E8F1FA;
  --card: #FFFFFF;
  --topbar: rgba(255,255,255,.7);
  --primary: #378ADD;
  --primary-dark: #185FA5;
  --primary-darker: #042C53;
  --primary-light: #B5D4F4;
  --primary-lighter: #E6F1FB;
  --text: #042C53;
  --text-secondary: #185FA5;
  --text-muted: #6B8AB0;
  --border: rgba(181,212,244,.5);
  --shadow: 0 4px 20px rgba(55,138,221,.12);
  --shadow-hover: 0 8px 30px rgba(55,138,221,.2);
  --shadow-sm: 0 2px 8px rgba(55,138,221,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Heebo',system-ui,sans-serif;background:var(--bg-grad);color:var(--text);min-height:100vh;position:relative;overflow-x:hidden}
.clouds{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cloud{position:absolute;border-radius:50%;background:rgba(181,212,244,.15);filter:blur(40px)}
.cloud:nth-child(1){width:200px;height:60px;top:10%;left:15%;animation:f0 15s ease-in-out infinite}
.cloud:nth-child(2){width:230px;height:65px;top:30%;right:10%;animation:f1 17s ease-in-out infinite}
.cloud:nth-child(3){width:260px;height:70px;top:55%;left:25%;animation:f2 19s ease-in-out infinite}
.cloud:nth-child(4){width:290px;height:75px;top:75%;right:20%;animation:f0 21s ease-in-out infinite}
.cloud:nth-child(5){width:180px;height:55px;top:5%;right:35%;animation:f1 13s ease-in-out infinite}
.cloud:nth-child(6){width:220px;height:62px;top:45%;right:5%;animation:f2 16s ease-in-out infinite}
.cloud:nth-child(7){width:250px;height:68px;top:85%;left:5%;animation:f0 18s ease-in-out infinite}
.cloud:nth-child(8){width:200px;height:58px;top:20%;left:50%;animation:f1 14s ease-in-out infinite}
@keyframes f0{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
@keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,15px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,25px)}}
.sidebar{position:fixed;top:0;right:0;bottom:0;width:240px;background:var(--sidebar);border-left:1px solid var(--border);z-index:50;padding:16px;overflow-y:auto;transition:transform .3s ease;backdrop-filter:blur(10px);box-shadow:-4px 0 20px rgba(55,138,221,.1)}
.sidebar.closed{transform:translateX(100%);box-shadow:none}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:8px}
.brand-mark{width:40px;height:40px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700}
.brand-title{font-size:15px;font-weight:700;color:var(--text)}
.brand-sub{font-size:11px;color:var(--text-muted)}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:transparent;color:var(--text);border:none;border-radius:10px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s;text-align:right;width:100%}
.nav-item:hover{background:rgba(55,138,221,.08)}
.nav-item.active{background:var(--primary);color:#fff;font-weight:600}
.nav-item svg{flex-shrink:0;width:17px;height:17px}
.main{margin-right:240px;transition:margin .3s ease;position:relative;z-index:1;min-height:100vh}
.main.full{margin-right:0}
.topbar{background:var(--topbar);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:40}
.menu-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;display:flex}
.search-wrap{flex:1;position:relative;max-width:400px}
.search-wrap input{width:100%;padding:8px 36px 8px 12px;background:#fff;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.search-wrap svg{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:16px;height:16px}
.date-chip{background:var(--primary-lighter);color:var(--primary);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500}
.content{padding:24px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);border:.5px solid var(--border);transition:all .25s ease;position:relative;z-index:1}
.card.hoverable{cursor:pointer}
.card.hoverable:hover{box-shadow:var(--shadow-hover);transform:translateY(-3px)}
.page-title{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title-left{display:flex;flex-direction:column}
.page-title-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.page-title-icon{background:var(--primary-lighter);color:var(--primary);padding:8px;border-radius:10px;display:flex}
.page-title h1{font-size:24px;font-weight:600;color:var(--text);margin:0}
.page-subtitle{color:var(--text-muted);font-size:13px;padding-right:38px}
.btn{padding:10px 18px;font-size:14px;border-radius:10px;cursor:pointer;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;border:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:#fff;color:var(--primary);border:1px solid var(--primary-light)}
.btn-secondary:hover{background:var(--primary-lighter)}
.btn-ghost{background:transparent;color:var(--text)}
.btn-ghost:hover{background:var(--primary-lighter)}
.btn-danger{background:#EF4444;color:#fff}
.btn-danger:hover{background:#DC2626}
.btn-sm{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;display:inline-flex;color:var(--primary)}
.icon-btn.danger{color:#EF4444}
.input,.textarea,.select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--primary-light);background:#fff;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--primary)}
.textarea{resize:vertical;line-height:1.6}
.grid{display:grid;gap:14px}
.grid-stats{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:20px}
.grid-cards{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-tiles{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.grid-files{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.empty{text-align:center;padding:40px;color:var(--text-muted)}
.empty-icon{margin:0 auto 12px;opacity:.4}
.empty h3{font-size:16px;font-weight:500;color:var(--text-secondary);margin-bottom:4px}
.empty p{font-size:13px}
.stat-card{padding:18px;display:flex;align-items:center;gap:14px}
.stat-icon{padding:12px;border-radius:12px;display:flex}
.stat-num{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:4px}
.list-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.list-item-text{flex:1;font-size:14px;color:var(--text)}
.list-item-meta{font-size:12px;color:var(--text-muted)}
.checkbox{width:20px;height:20px;border:2px solid var(--primary);border-radius:4px;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.checkbox.checked{background:var(--primary)}
.modal{position:fixed;inset:0;background:rgba(4,44,83,.7);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-content{background:#fff;border-radius:16px;padding:20px;max-width:90%;max-height:90%;overflow:auto;position:relative}
.modal-close{position:absolute;top:10px;left:10px;background:#fff;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.overlay{position:fixed;inset:0;background:rgba(4,44,83,.4);z-index:49;backdrop-filter:blur(2px);display:none}
.overlay.show{display:block}
.mood-grid{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.mood-btn{background:none;border:2px solid transparent;border-radius:12px;padding:10px;font-size:32px;cursor:pointer;transition:transform .2s}
.mood-btn:hover{transform:scale(1.15)}
.mood-btn.selected{background:var(--primary-lighter);border-color:var(--primary)}
.water-cups{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.water-cup{width:50px;height:70px;background:#fff;border:3px solid var(--primary);border-radius:8px;cursor:pointer;font-size:20px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.water-cup.filled{background:var(--primary)}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-title{font-size:18px;font-weight:600;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);padding:8px}
.cal-day{aspect-ratio:1;background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;position:relative;transition:all .2s}
.cal-day:hover{background:var(--primary-lighter)}
.cal-day.today{border-color:var(--primary);font-weight:700;background:var(--primary-lighter)}
.cal-day.selected{background:var(--primary);color:#fff}
.cal-day.has-event::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--primary);border-radius:50%}
.cal-day.selected.has-event::after{background:#fff}
.habit-circle{width:44px;height:44px;border-radius:50%;background:#fff;border:2px solid var(--primary);color:var(--primary);cursor:pointer;font-size:20px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.habit-circle.done{background:var(--primary);color:#fff}
.sticker-collection{display:flex;flex-wrap:wrap;gap:12px;padding:16px;background:var(--primary-lighter);border-radius:12px;min-height:80px}
.sticker-item{font-size:36px}
.stickers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px}
.sticker-btn{aspect-ratio:1;font-size:28px;background:#fff;border:2px solid var(--primary-light);border-radius:10px;cursor:pointer;transition:all .2s}
.sticker-btn:hover{transform:scale(1.1)}
.sticker-btn.selected{background:var(--primary);border-color:var(--primary)}
.file-card{padding:12px}
.file-thumb{aspect-ratio:1;background:var(--primary-lighter);border-radius:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;color:var(--primary)}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.file-actions{display:flex;gap:4px}
.file-action-btn{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit}
.file-action-btn.view{background:var(--primary-lighter);color:var(--primary)}
.file-action-btn.delete{background:#FEE2E2;color:#EF4444;flex:0 0 auto;padding:6px 8px}
.dropzone{border:2px dashed var(--primary-light);text-align:center;padding:40px;cursor:pointer;transition:all .2s}
.dropzone.dragover{background:var(--primary-lighter);border-color:var(--primary)}
.progress-row{display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:10px;background:var(--primary-lighter);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);transition:width .3s}
.progress-num{font-size:13px;font-weight:600;color:var(--primary);width:40px}
.budget-row{display:flex;align-items:center;gap:14px;padding:10px;border-bottom:1px solid var(--border)}
.budget-bar{width:8px;height:32px;border-radius:4px}
.budget-amount{font-size:16px;font-weight:700}
@media(max-width:768px){.sidebar{box-shadow:-4px 0 20px rgba(55,138,221,.2)}.main{margin-right:0}.grid-stats{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.cal-day{font-size:12px}}
select.input{padding:10px 14px}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>

function viewDashboard(){const d=new Date();const dn=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][d.getDay()];const ds=d.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});const todos=state.data.todos||[];const stats=[{label:'משימות פעילות',value:todos.filter(t=>!t.done).length,iconName:'check',color:'#378ADD'},{label:'הערות',value:(state.data.notes||[]).length,iconName:'note',color:'#10B981'},{label:'הרגלים',value:(state.data.habits||[]).length,iconName:'repeat',color:'#F59E0B'},{label:'מטרות',value:(state.data.goals||[]).length,iconName:'target',color:'#EF4444'}];const tt=todos.filter(t=>!t.done).slice(0,5);const tm=(state.data.mood||[]).find(m=>m.date===today());const wt=(state.data.water||[]).find(w=>w.date===today())?.cups||0;return`${pageTitle('home',`שלום, ${state.data.userName} 👋`,`יום ${dn}, ${ds}`)}<div class="grid grid-stats">${stats.map(s=>`<div class="card hoverable stat-card"><div class="stat-icon" style="background:${s.color}15;color:${s.color}">${icon(s.iconName,22)}</div><div><div class="stat-num">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('')}</div><div class="grid grid-cards"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:15px;font-weight:600;color:var(--text);margin:0;display:flex;align-items:center;gap:8px">${icon('check',16)} משימות להיום</h3><button class="btn btn-ghost btn-sm" onclick="setView('todos')">הצג הכל</button></div>${tt.length===0?emptyState('check','אין משימות פתוחות','כל הכבוד!'):tt.map(t=>`<div class="list-item"><div class="checkbox"></div><div class="list-item-text">${esc(t.text)}</div></div>`).join('')}</div><div class="card"><h3 style="font-size:15px;font-weight:600;color:var(--text);margin:0 0 14px;display:flex;align-items:center;gap:8px">${icon('smile',16)} מצב הרוח שלי</h3>${tm?`<div style="text-align:center;padding:16px"><div style="font-size:48px;margin-bottom:8px">${tm.emoji}</div><div style="color:var(--text-secondary);font-size:13px">${esc(tm.note||'לא נכתבה הערה')}</div></div>`:`<div style="text-align:center;padding:16px"><div class="mood-grid">${['😊','😐','😢','😡','🥳'].map(e=>`<button class="mood-btn" onclick="setMoodDash('${e}')">${e}</button>`).join('')}</div><div style="font-size:12px;color:var(--text-muted)">איך אתה מרגיש היום?</div></div>`}</div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:15px;font-weight:600;color:var(--text);margin:0;display:flex;align-items:center;gap:8px">${icon('drop',16)} מים היום</h3><div style="font-size:18px;font-weight:700;color:var(--primary)">${wt}/8</div></div><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">${[...Array(8)].map((_,i)=>`<button onclick="setWater(${i+1===wt?i:i+1})" style="width:28px;height:36px;background:${i<wt?'var(--primary)':'#fff'};border:2px solid var(--primary);border-radius:4px;cursor:pointer"></button>`).join('')}</div></div></div>`}

function delGoal(id){if(!confirm('למחוק?'))return;state.data.goals=state.data.goals.filter(g=>g.id!==id);save('goals');render()}
const ALL_S=['⭐','❤️','🔥','💪','🎉','🌟','💡','🎯','✨','🏆','🌈','🚀','🎨','🌺','🦋','🍀','💎','🎪','🎭','🌙'];
function viewStickers(){const s=state.data.stickers||[];return`${pageTitle('sparkle','מדבקות','אוסף המדבקות האישי שלי')}<div class="card"><h3 style="margin:0 0 12px;font-size:14px;font-weight:600;color:var(--text)">אוסף (${s.length})</h3><div class="sticker-collection">${s.length===0?'<div style="color:var(--text-muted);font-size:13px;align-self:center">הוסף מדבקות מהרשימה למטה</div>':s.map(x=>`<div class="sticker-item">${x}</div>`).join('')}</div></div><div class="card" style="margin-top:14px"><h3 style="margin:0 0 12px;font-size:14px;font-weight:600;color:var(--text)">כל המדבקות</h3><div class="stickers-grid">${ALL_S.map(x=>`<button class="sticker-btn ${s.includes(x)?'selected':''}" onclick="togSt('${x}')">${x}</button>`).join('')}</div></div>`}
function togSt(s){const a=state.data.stickers||[];state.data.stickers=a.includes(s)?a.filter(x=>x!==s):[...a,s];save('stickers');render()}
let selDay=null;
function viewCalendar(){const e=state.data.events||{};const d=window.calCur||new Date();const y=d.getFullYear();const m=d.getMonth();const fd=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();const mn=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];const dn=['א','ב','ג','ד','ה','ו','ש'];const gK=d=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const td=new Date();return`${pageTitle('calCheck','לוח שנה','ניהול אירועים ופגישות')}<div class="card"><div class="cal-header"><button class="btn btn-ghost" onclick="chMonth(-1)">${icon('arrowR',16)}</button><div class="cal-title">${mn[m]} ${y}</div><button class="btn btn-ghost" onclick="chMonth(1)">${icon('arrowL',16)}</button></div><div class="cal-grid" style="margin-bottom:8px">${dn.map(n=>`<div class="cal-day-name">${n}</div>`).join('')}</div><div class="cal-grid">${[...Array(fd)].map(()=>'<div></div>').join('')}${[...Array(dim)].map((_,i)=>{const day=i+1;const k=gK(day);const has=e[k]?.length>0;const sel=selDay===day;const isT=td.getFullYear()===y&&td.getMonth()===m&&td.getDate()===day;return`<button class="cal-day ${isT?'today':''} ${sel?'selected':''} ${has?'has-event':''}" onclick="selD(${day})">${day}</button>`}).join('')}</div></div>${selDay?`<div class="card" style="margin-top:14px"><h3 style="margin:0 0 12px;font-size:14px;font-weight:600;color:var(--text)">${selDay} ב${mn[m]} ${y}</h3><div style="display:flex;gap:10px;margin-bottom:10px"><input class="input" id="eT" placeholder="הוסף אירוע..." onkeypress="if(event.key==='Enter') addEvt('${gK(selDay)}')"><button class="btn btn-primary" onclick="addEvt('${gK(selDay)}')">${icon('plus',16)}</button></div>${(e[gK(selDay)]||[]).map(x=>`<div class="list-item"><div style="width:6px;height:6px;background:var(--primary);border-radius:50%"></div><div class="list-item-text">${esc(x.text)}</div><button class="icon-btn danger" onclick="delEvt('${gK(selDay)}',${x.id})">${icon('trash',14)}</button></div>`).join('')||'<div style="color:var(--text-muted);text-align:center;padding:20px">אין אירועים ביום זה</div>'}</div>`:''}`}
function chMonth(d){const c=window.calCur||new Date();window.calCur=new Date(c.getFullYear(),c.getMonth()+d,1);selDay=null;render()}
function selD(d){selDay=d;render()}
function addEvt(k){const t=document.getElementById('eT').value.trim();if(!t)return;state.data.events=state.data.events||{};state.data.events[k]=[...(state.data.events[k]||[]),{id:Date.now(),text:t}];save('events');render()}
function delEvt(k,id){state.data.events[k]=state.data.events[k].filter(e=>e.id!==id);save('events');render()}
function viewPortfolio(){const p=state.data.portfolio||[];return`${pageTitle('briefcase','פורטפוליו','הפרויקטים שלי')}<div class="card" style="margin-bottom:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px"><input class="input" id="pT" placeholder="שם הפרויקט..."><input class="input" id="pTc" placeholder="טכנולוגיות..."></div><input class="input" id="pL" placeholder="קישור (URL)..." style="margin-bottom:10px"><textarea class="textarea" id="pD" placeholder="תיאור הפרויקט..." rows="3"></textarea><div style="margin-top:10px"><button class="btn btn-primary" onclick="addPrj()">${icon('plus',14)} הוסף פרויקט</button></div></div><div class="grid grid-tiles">${p.length===0?emptyState('briefcase','אין פרויקטים עדיין'):p.map(x=>`<div class="card hoverable"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><h4 style="margin:0;font-size:16px;font-weight:600;color:var(--text)">${esc(x.title)}</h4><button class="icon-btn danger" onclick="delPrj(${x.id})">${icon('trash',14)}</button></div>${x.tech?`<div style="font-size:11px;color:var(--primary);font-weight:500;margin-bottom:8px">${esc(x.tech)}</div>`:''}<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;line-height:1.6">${esc(x.desc)}</div>${x.link?`<a href="${esc(x.link)}" target="_blank" rel="noopener" style="font-size:12px">← פתח פרויקט</a>`:''}</div>`).join('')}</div>`}
function addPrj(){const t=document.getElementById('pT').value.trim();if(!t)return;state.data.portfolio=[...(state.data.portfolio||[]),{id:Date.now(),title:t,tech:document.getElementById('pTc').value,link:document.getElementById('pL').value,desc:document.getElementById('pD').value}];save('portfolio');render()}
function delPrj(id){if(!confirm('למחוק?'))return;state.data.portfolio=state.data.portfolio.filter(p=>p.id!==id);save('portfolio');render()}
function viewFiles(){const f=state.data.files||[];return`${pageTitle('folder','מנהל קבצים','העלה ושמור קבצים, תמונות ומסמכים')}<div class="card dropzone" id="dz" onclick="document.getElementById('fI').click()">${icon('upload',40)}<div style="font-size:16px;font-weight:600;color:var(--text);margin-top:12px;margin-bottom:4px">גרור קבצים לכאן או לחץ לבחירה</div><div style="font-size:13px;color:var(--text-muted)">תמונות, PDF, מסמכים — שמירה מקומית בדפדפן</div><input type="file" id="fI" multiple style="display:none" onchange="hF(this.files)"></div><div class="grid grid-files" style="margin-top:16px">${f.length===0?emptyState('folder','אין קבצים עדיין','העלה את הקובץ הראשון!'):f.map(x=>{const im=x.type?.startsWith('image/');const ic=im?'image':'file';return`<div class="card hoverable file-card"><div class="file-thumb" onclick="prevF(${x.id})">${im&&x.data?`<img src="${x.data}" alt="${esc(x.name)}">`:icon(ic,48)}</div><div class="file-name" title="${esc(x.name)}">${esc(x.name)}</div><div class="file-size">${fSize(x.size)}</div><div class="file-actions"><button class="file-action-btn view" onclick="prevF(${x.id})">${icon('eye',12)} צפה</button><button class="file-action-btn delete" onclick="delF(${x.id})">${icon('trash',12)}</button></div></div>`}).join('')}</div>`}
function fSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(2)+' MB'}
function hF(fl){Array.from(fl).forEach(f=>{const r=new FileReader();r.onload=e=>{try{state.data.files=[...(state.data.files||[]),{id:Date.now()+Math.floor(Math.random()*1000),name:f.name,type:f.type,size:f.size,data:e.target.result,uploaded:Date.now()}];save('files');render()}catch(er){alert('שגיאה בשמירה')}};r.readAsDataURL(f)})}
function delF(id){if(!confirm('למחוק?'))return;state.data.files=state.data.files.filter(f=>f.id!==id);save('files');render()}
function prevF(id){const f=state.data.files.find(x=>x.id===id);if(!f)return;const im=f.type?.startsWith('image/');const pd=f.type?.includes('pdf');const m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="modal-content" onclick="event.stopPropagation()"><button class="modal-close" onclick="this.closest('.modal').remove()">${icon('x',16)}</button><h3 style="margin:0 0 16px;color:var(--text)">${esc(f.name)}</h3>${im?`<img src="${f.data}" style="max-width:100%;border-radius:8px">`:pd?`<iframe src="${f.data}" style="width:70vw;height:70vh;border:none"></iframe>`:`<div style="padding:40px;text-align:center;color:var(--text-muted)">${icon('file',64)}<div style="margin-top:12px">לא ניתן להציג</div><a href="${f.data}" download="${esc(f.name)}" style="margin-top:12px;display:inline-block">הורד קובץ</a></div>`}</div>`;m.onclick=()=>m.remove();document.body.appendChild(m)}
function render(){const c=document.getElementById('content');let h='';switch(state.view){case'dashboard':h=viewDashboard();break;case'notebook':h=viewNotebook();break;case'daily':h=viewPeriod('daily','calendar','יומן יומי');break;case'weekly':h=viewPeriod('weekly','calRange','יומן שבועי');break;case'monthly':h=viewPeriod('monthly','calDays','יומן חודשי');break;case'calendar':h=viewCalendar();break;case'notes':h=viewNotes();break;case'todos':h=viewTodos();break;case'habits':h=viewHabits();break;case'mood':h=viewMood();break;case'water':h=viewWater();break;case'budget':h=viewBudget();break;case'goals':h=viewGoals();break;case'stickers':h=viewStickers();break;case'portfolio':h=viewPortfolio();break;case'files':h=viewFiles();break}c.innerHTML=h;if(state.view==='files'){const dz=document.getElementById('dz');if(dz){dz.ondragover=e=>{e.preventDefault();dz.classList.add('dragover')};dz.ondragleave=()=>dz.classList.remove('dragover');dz.ondrop=e=>{e.preventDefault();dz.classList.remove('dragover');hF(e.dataTransfer.files)}}}}
function init(){loadData();document.getElementById('dateChip').textContent=new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});renderNav();applySidebar();render();window.addEventListener('resize',()=>{if(window.innerWidth<768&&state.sidebarOpen){state.sidebarOpen=false;applySidebar()}})}
init();
</script>
</body>
</html>
